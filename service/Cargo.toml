[package]
name = "service"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "service"
path = "src/bin/main.rs"

[lib]
name = "service"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8.9", features = ["macros"] }
config = { version = "0.15.23", features = ["yaml"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["full"] }
