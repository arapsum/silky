server:
  protocol: http
  host: 127.0.0.1
  port: 7175

database:
  uri: postgresql://username:password@localhost:5432/database
  max_connections: 1
  min_connections: 1
  connection_timeout: 5
  idle_timeout: 5
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: true

logger:
  level: trace
  format: full
  crates:
    - axum
    - service
    - sqlx
