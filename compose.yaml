services:
  database:
    image: postgres:18.3-alpine
    container_name: silk-database
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - postgresql
  mailer:
    image: mailtutan/mailtutan:latest
    container_name: mailer
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - mailer

networks:
  postgresql:
  mailer:
