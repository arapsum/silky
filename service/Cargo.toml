[package]
name = "service"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "service"
path = "src/bin/main.rs"

[lib]
name = "service"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8.9", features = ["macros"] }
clap = { version = "4.6.1", features = ["derive"] }
color-eyre = "0.6.5"
config = { version = "0.15.23", features = ["yaml"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["full"] }
tracing = { version = "0.1.44", features = ["log"] }
tracing-error = "0.2.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json", "serde"] }
