name: Silky CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  RUST_TOOLCHAIN: stable
  TOOLCHAIN_PROFILE: minimal

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Shared setup
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'admin/**'
              - '.github/workflows/ci.yaml'

            service:
              - 'service/**'
              - '.github/workflows/ci.yaml'

  # Admin UI jobs
  admin-format:
    name: Admin - Style & Format
    runs-on: ubuntu-latest
    needs:
      - changes
    defaults:
      run:
        working-directory: admin

    if: needs.changes.outputs.admin == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml

      - name: Install admin dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile

      - name: Format admin
        run: pnpm --filter admin fmt

  admin-lint:
    name: Admin - Lint & Type check
    runs-on: ubuntu-latest
    needs:
      - changes

    if: needs.changes.outputs.admin == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml

      - name: Install admin dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile

      - name: Lint admin
        working-directory: admin
        run: pnpm lint

      - name: Type check admin
        working-directory: admin
        run: pnpm exec tsc --noEmit

  admin-build:
    name: Admin — Build
    runs-on: ubuntu-latest
    needs:
      - changes

    if: needs.changes.outputs.admin == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml

      - name: Install admin dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile

      - name: Build admin
        working-directory: admin
        run: pnpm build

  rustfmt:
    name: Check Style
    runs-on: ubuntu-latest
    needs:
      - changes
    defaults:
      run:
        working-directory: service

    if: needs.changes.outputs.service == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    needs:
      - changes
    defaults:
      run:
        working-directory: service

    if: needs.changes.outputs.service == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: service
      - name: Run cargo clippy
        run: cargo clippy --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W rust-2018-idioms

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs:
      - changes
    defaults:
      run:
        working-directory: service

    if: needs.changes.outputs.service == 'true'

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: database
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
        ports:
          - "5432:5432"
        ## Heath checks to wait until postgres has begun
        options: --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-alpine
        ports:
          - "6379:6379"

      mailer:
        image: mailtutan/mailtutan:latest
        ports:
          - "1080:1080"
          - "1025:1025"

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Generate JWT PEM keys
        run: |
          mkdir -p secrets/keys/test
          echo "${{ secrets.ACCESS_KEY }}" >> secrets/keys/test/access_key.pem
          echo "${{ secrets.ACCESS_KEY_PUB }}" >> secrets/keys/test/access_key_pub.pem
          echo "${{ secrets.REFRESH_KEY }}" >> secrets/keys/test/refresh_key.pem
          echo "${{ secrets.REFRESH_KEY_PUB }}" >> secrets/keys/test/refresh_key_pub.pem
      - name: Run cargo test
        run: cargo test --all-features --all
        env:
          DATABASE_URL: postgresql://username:password@localhost:5432/database
