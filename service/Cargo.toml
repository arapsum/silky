[package]
name = "service"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "service"
path = "src/bin/main.rs"

[lib]
name = "service"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8.9", features = ["macros"] }
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }
