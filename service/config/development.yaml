server:
  protocol: http
  host: 127.0.0.1
  port: 7150

database:
  uri: postgresql://username:password@localhost:5432/database
  max_connections: 10
  min_connections: 1
  connection_timeout: 5
  idle_timeout: 5
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

logger:
  level: debug
  format: pretty
  crates:
    - axum
    - service

auth:
  verification_token_expiry: 86400 # seconds
  refresh_token_expiry: 900 # seconds
