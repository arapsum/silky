name: Silky CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  RUST_TOOLCHAIN: stable
  TOOLCHAIN_PROFILE: minimal

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Shared setup
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      admin: ${{ steps.filter.outputs.admin }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'admin/**'

            server:
              - 'server/**'

  rustfmt:
    name: Check Style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: service
      - name: Run cargo clippy
        run: cargo clippy --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery -W rust-2018-idioms

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: database
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
        ports:
          - "5432:5432"
        ## Heath checks to wait until postgres has begun
        options: --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.6-alpine
        ports:
          - "6379:6379"

      mailer:
        image: mailtutan/mailtutan:latest
        ports:
          - "1080:1080"
          - "1025:1025"

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Generate JWT PEM keys
        run: |
          mkdir -p secrets/keys/test
          echo "${{ secrets.ACCESS_KEY }}" >> secrets/keys/test/access_key.pem
          echo "${{ secrets.ACCESS_KEY_PUB }}" >> secrets/keys/test/access_key_pub.pem
          echo "${{ secrets.REFRESH_KEY }}" >> secrets/keys/test/refresh_key.pem
          echo "${{ secrets.REFRESH_KEY_PUB }}" >> secrets/keys/test/refresh_key_pub.pem
      - name: Run cargo test
        run: cargo test --all-features --all
        env:
          DATABASE_URL: postgresql://username:password@localhost:5432/database
